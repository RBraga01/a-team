<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#0f172a"/>

  <!-- Bold geometric A — left leg -->
  <polygon points="256,72 152,420 196,420 256,228 316,420 360,420" fill="#e2e8f0"/>

  <!-- Crossbar cutout (carves out the middle of the A to form crossbar zone) -->
  <rect x="180" y="268" width="152" height="44" fill="#0f172a"/>

  <!-- Agent dots along crossbar — 5 circles representing team members -->
  <circle cx="196" cy="290" r="14" fill="#6366f1"/>
  <circle cx="226" cy="290" r="14" fill="#818cf8"/>
  <circle cx="256" cy="290" r="14" fill="#a5b4fc"/>
  <circle cx="286" cy="290" r="14" fill="#818cf8"/>
  <circle cx="316" cy="290" r="14" fill="#6366f1"/>

  <!-- Subtle outer ring -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#334155" stroke-width="6"/>
</svg>
