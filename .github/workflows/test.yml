name: A Team Tests

on:
  push:
    branches: [main, master]
  pull_request:
    paths:
      - 'skills/**'
      - '.claude/agents/**'
      - '.claude/rules/**'
      - 'tests/**'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Test mode (replay uses saved transcripts; record runs live sessions)'
        required: true
        default: 'replay'
        type: choice
        options: [replay, record]

jobs:
  # ── Unit tests (offline, no API key needed) ─────────────────────────────────
  unit-tests:
    name: Unit Tests (parser + assertions)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run parser unit tests
        working-directory: tests
        run: node --test lib/transcript-parser.test.js

      - name: Run assertion unit tests
        working-directory: tests
        run: node --test lib/assertions.test.js

  # ── Integration tests (replay mode — uses committed transcripts) ─────────────
  integration-tests-replay:
    name: Integration Tests (replay)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check for saved transcripts
        id: check
        run: |
          count=$(find tests/transcripts -name '*.jsonl' 2>/dev/null | wc -l | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"

      - name: Run all suites in replay mode
        if: steps.check.outputs.count != '0'
        working-directory: tests
        env:
          TEST_MODE: replay
        run: node runner.js

      - name: Upload test reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-reports-${{ github.sha }}
          path: tests/reports/
          retention-days: 30

  # ── Integration tests (record mode — runs live sessions, costs $) ─────────────
  integration-tests-record:
    name: Integration Tests (record live sessions)
    runs-on: ubuntu-latest
    needs: unit-tests
    if: github.event.inputs.mode == 'record'
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Record sessions and run assertions
        working-directory: tests
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TEST_MODE: record
        run: node runner.js --record

      - name: Upload recorded transcripts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: transcripts-${{ github.sha }}
          path: tests/transcripts/
          retention-days: 90

      - name: Upload test reports
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-reports-record-${{ github.sha }}
          path: tests/reports/
          retention-days: 30
